name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    # Ubuntu has all POSIX headers (unistd.h, fcntl.h, fsync, gethostname, etc.)
    # and supports MySQL Connector C++ X DevAPI natively via deb packages.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── System build tools + OpenSSL ──────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential \
            cmake \
            libssl-dev

      # ── MySQL Connector C++ 9.5 (X DevAPI) ───────────────────────────────────
      # No apt package exists — download deb directly from MySQL CDN.
      - name: Install MySQL Connector C++ 9.5
        run: |
          cd /tmp

          # Runtime library
          wget -q "https://cdn.mysql.com/Downloads/Connector-C++/libmysqlcppconnx2_9.5.0-1ubuntu24.04_amd64.deb" \
               -O mysql-runtime.deb

          # Development headers + .so symlink
          wget -q "https://cdn.mysql.com/Downloads/Connector-C++/libmysqlcppconnx-dev_9.5.0-1ubuntu24.04_amd64.deb" \
               -O mysql-dev.deb

          sudo dpkg -i mysql-runtime.deb mysql-dev.deb

          # Verify headers landed in a standard path
          if find /usr /usr/local -name "xdevapi.h" 2>/dev/null | grep -q xdevapi; then
            echo "✅ mysqlx/xdevapi.h found:"
            find /usr /usr/local -name "xdevapi.h" 2>/dev/null
          else
            echo "⚠ xdevapi.h not in /usr — checking dpkg content list..."
            dpkg -L libmysqlcppconnx-dev 2>/dev/null || true
          fi

      # ── CMake configure ───────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel 4

      # ── Upload binary ─────────────────────────────────────────────────────────
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: BankingAPIServer-Linux
          path: build/BankingAPIServer
