name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── System build tools + OpenSSL ──────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential cmake libssl-dev

      # ── MySQL Connector C++ X DevAPI — tarball from MySQL CDN ─────────────────
      # apt's libmysqlcppconn-dev is v1.1 (JDBC only — no xdevapi.h).
      # MySQL Innovation APT repo GPG key has expired.
      # Direct tarball download bypasses both problems entirely.
      - name: Install MySQL Connector C++ (X DevAPI)
        run: |
          set -e
          CONNECTOR_DIR="/opt/mysql-connector-cpp"
          sudo mkdir -p "$CONNECTOR_DIR"
          DOWNLOADED=false

          # Probe CDN for available version/glibc combos (newest first)
          for VERSION in "9.5.0" "9.3.0" "9.2.0" "9.1.0" "9.0.0" "8.4.0" "8.3.0"; do
            for GLIBC in "2.28" "2.17"; do
              URL="https://cdn.mysql.com/Downloads/Connector-C++/mysql-connector-c++-${VERSION}-linux-glibc${GLIBC}-x86-64bit.tar.gz"
              echo "  → Trying MySQL Connector C++ ${VERSION} (glibc${GLIBC})..."
              if wget -q "$URL" -O /tmp/connector.tar.gz 2>/dev/null; then
                sudo tar -xzf /tmp/connector.tar.gz -C "$CONNECTOR_DIR" --strip-components=1
                echo "✅ Installed MySQL Connector C++ ${VERSION} (glibc${GLIBC}) → $CONNECTOR_DIR"
                DOWNLOADED=true
                break 2
              fi
              rm -f /tmp/connector.tar.gz
            done
          done

          if [ "$DOWNLOADED" = "false" ]; then
            echo "❌ All CDN download attempts failed. Checked versions: 9.5.0 9.3.0 9.2.0 9.1.0 9.0.0 8.4.0 8.3.0"
            exit 1
          fi

          # Register library path so the linker can find libmysqlcppconnx.so
          printf '%s\n' "$CONNECTOR_DIR/lib64" "$CONNECTOR_DIR/lib" \
            | sudo tee /etc/ld.so.conf.d/mysql-connector.conf
          sudo ldconfig

          # Verify xdevapi.h is present
          HEADER=$(find "$CONNECTOR_DIR" -name "xdevapi.h" 2>/dev/null | head -1)
          if [ -z "$HEADER" ]; then
            echo "❌ xdevapi.h not found inside tarball at $CONNECTOR_DIR"
            find "$CONNECTOR_DIR" -type f | head -20
            exit 1
          fi
          echo "✅ xdevapi.h: $HEADER"

          # Export path for CMake
          echo "MYSQL_CONNECTOR_DIR=$CONNECTOR_DIR" >> "$GITHUB_ENV"

      # ── Configure CMake ───────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          echo "MYSQL_CONNECTOR_DIR = $MYSQL_CONNECTOR_DIR"
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DMYSQL_CONNECTOR_DIR="$MYSQL_CONNECTOR_DIR"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel 4

      # ── Upload binary ─────────────────────────────────────────────────────────
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: BankingAPIServer-Linux
          path: build/BankingAPIServer
