name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── System build tools + OpenSSL ──────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential cmake libssl-dev

      # ── MySQL Connector C++ (X DevAPI) ────────────────────────────────────────
      # Strategy:
      #   1. Try Ubuntu's built-in package (libmysqlcppconn-dev) — includes
      #      mysqlx/xdevapi.h and libmysqlcppconnx.so, works on Ubuntu 22+
      #   2. If xdevapi.h is still missing, add the MySQL Innovation APT repo
      #      and install libmysqlcppconnx-dev (MySQL 9.x packages)
      - name: Install MySQL Connector C++
        run: |
          set -e

          # ── Method 1: Ubuntu default repository ───────────────────────────────
          echo "==> Trying ubuntu repo: libmysqlcppconn-dev"
          sudo apt-get install -y libmysqlcppconn-dev || true

          # Check if X DevAPI header is now available
          if find /usr /usr/local -name "xdevapi.h" 2>/dev/null | grep -q .; then
            echo "✅ xdevapi.h found via apt — done."
            find /usr /usr/local -name "xdevapi.h" 2>/dev/null
            exit 0
          fi

          # ── Method 2: MySQL Innovation APT repository (MySQL 9.x) ─────────────
          echo "==> xdevapi.h not found. Adding MySQL Innovation APT repo..."
          wget -q https://dev.mysql.com/get/mysql-apt-config_0.8.33-1_all.deb -O mysql-apt.deb
          echo "mysql-apt-config mysql-apt-config/select-server select mysql-innovation" \
            | sudo debconf-set-selections
          DEBIAN_FRONTEND=noninteractive sudo dpkg -i mysql-apt.deb
          sudo apt-get update -q

          for pkg in libmysqlcppconnx-dev libmysqlcppconn9-dev libmysqlcppconn-dev; do
            if sudo apt-get install -y "$pkg" 2>/dev/null; then
              echo "✅ Installed $pkg"
              break
            fi
          done

          # ── Final check ────────────────────────────────────────────────────────
          HEADER=$(find /usr /usr/local -name "xdevapi.h" 2>/dev/null | head -1)
          if [ -z "$HEADER" ]; then
            echo "❌ mysqlx/xdevapi.h not found after both install attempts."
            dpkg -l | grep -i mysql || true
            exit 1
          fi
          echo "✅ Header found: $HEADER"

      # ── CMake configure ───────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel 4

      # ── Upload binary ─────────────────────────────────────────────────────────
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: BankingAPIServer-Linux
          path: build/BankingAPIServer
