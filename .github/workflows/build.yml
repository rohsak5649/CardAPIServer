name: Build Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ── Install OpenSSL (Chocolatey is pre-installed on windows-latest) ───────
      - name: Install OpenSSL
        run: choco install openssl --no-progress -y

      # ── Download and Install MySQL Connector C++ 9.5 MSI ─────────────────────
      # choco has no mysql-connector-c++ package, so we download from MySQL CDN
      - name: Install MySQL Connector C++
        shell: pwsh
        run: |
          $url = "https://cdn.mysql.com//Downloads/Connector-C++/mysql-connector-c++-9.5.0-winx64.msi"
          $out = "$env:TEMP\mysql-connector-cpp.msi"
          Write-Host "Downloading MySQL Connector C++ from $url"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Installing MySQL Connector C++..."
          Start-Process msiexec.exe -ArgumentList "/i", $out, "/quiet", "/norestart" -Wait
          Write-Host "Installation complete."

      # ── Verify paths exist before calling CMake ───────────────────────────────
      - name: Verify dependency paths
        shell: pwsh
        run: |
          $ssl  = "C:/Program Files/OpenSSL-Win64"
          $mysql = "C:/Program Files/MySQL/MySQL Connector C++ 9.5"
          if (!(Test-Path $ssl))   { Write-Error "OpenSSL path not found: $ssl" }
          if (!(Test-Path $mysql)) { Write-Error "MySQL Connector path not found: $mysql" }
          Write-Host "OpenSSL path: $ssl"
          Get-ChildItem "$mysql\lib64" -ErrorAction SilentlyContinue

      # ── Configure CMake ───────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Project
        run: cmake --build build --config Release --parallel 4

      # ── Upload resulting EXE as downloadable artifact ─────────────────────────
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BankingAPIServer-EXE
          path: build/**/*.exe
